<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualizador SQL</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #13151a;
      --surface: #1c1f28;
      --border:  #2e3340;
      --accent:  #4f8ef7;
      --accent2: #38c9a8;
      --warn:    #f7c94f;
      --text:    #c8cdd8;
      --muted:   #555c70;
      --kw:      #79b8ff;
      --fn:      #e3b341;
      --str:     #9ecbff;
      --cm:      #6a737d;
      --nm:      #79c0ff;
      --op:      #f97583;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    header { text-align: center; }
    header h1 { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* Drop zone */
    .drop-zone {
      width: 100%; max-width: 860px;
      border: 2px dashed var(--border);
      border-radius: 14px; padding: 32px 40px;
      text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s;
      background: var(--surface);
    }
    .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: #1e2330; }
    .drop-zone input { display: none; }
    .drop-zone .icon { font-size: 38px; margin-bottom: 10px; }
    .drop-zone label { font-size: 15px; color: var(--accent); cursor: pointer; font-weight: 600; }
    .drop-zone p { font-size: 12px; color: var(--muted); margin-top: 6px; }

    /* Encoding row */
    .enc-row {
      display: none; align-items: center; gap: 10px;
      width: 100%; max-width: 860px;
    }
    .enc-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
    .enc-row select {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); padding: 6px 10px;
      font-size: 13px; font-family: inherit; cursor: pointer; outline: none;
    }
    #file-badge {
      font-size: 12px; color: var(--accent2); margin-left: auto;
      background: #1a2e28; border: 1px solid var(--accent2);
      border-radius: 20px; padding: 3px 14px;
    }

    /* Toolbar */
    .toolbar {
      display: none; align-items: center; gap: 8px;
      width: 100%; max-width: 860px; flex-wrap: wrap;
    }
    .btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 13px; font-family: inherit;
      padding: 7px 14px; cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }
    .btn:hover { background: #2a2f3d; border-color: var(--accent); color: #fff; }
    .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.danger:hover { border-color: var(--op); color: var(--op); }
    .sep { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

    .search-wrap {
      display: flex; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 4px 10px; gap: 6px;
      flex: 1; min-width: 140px;
    }
    .search-wrap input {
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 13px;
      font-family: 'JetBrains Mono', monospace; width: 100%;
    }
    .search-wrap span { color: var(--muted); font-size: 14px; }
    #match-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

    /* Code box */
    #code-box {
      display: none; width: 100%; max-width: 860px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }

    /* View pane */
    #view-pane { overflow: auto; max-height: 70vh; }
    #line-wrap { display: flex; }
    #line-nums {
      padding: 20px 0; text-align: right; user-select: none;
      background: #181b24; border-right: 1px solid var(--border);
      min-width: 52px; font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.7; color: var(--muted);
    }
    #line-nums span { display: block; padding: 0 12px; }
    #code-content {
      padding: 20px; font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.7; white-space: pre-wrap;
      word-break: break-word; flex: 1; outline: none; overflow: visible;
    }

    /* Edit pane */
    #edit-pane { display: none; overflow: auto; max-height: 70vh; }
    #editor {
      width: 100%; min-height: 300px;
      background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.7; padding: 20px;
      resize: none; tab-size: 2; display: block; white-space: pre; overflow-wrap: normal;
    }

    /* Highlights */
    mark { background: rgba(247,201,79,.3); color: inherit; border-radius: 2px; outline: 1px solid rgba(247,201,79,.6); }
    mark.current { background: rgba(247,201,79,.65); }

    /* Syntax */
    .kw  { color: var(--kw); font-weight: 600; }
    .fn  { color: var(--fn); }
    .str { color: var(--str); }
    .cm  { color: var(--cm); font-style: italic; }
    .nm  { color: var(--nm); }
    .op  { color: var(--op); }

    /* Status bar */
    .statusbar {
      display: none; width: 100%; max-width: 860px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 18px;
      font-size: 12px; color: var(--muted);
      flex-wrap: wrap; gap: 20px;
    }
    .statusbar b { color: var(--text); }

    /* Save dropdown */
    .save-wrap { position: relative; }
    .save-menu {
      display: none; position: absolute; top: calc(100% + 6px); left: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; z-index: 100;
      min-width: 180px; box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .save-menu.open { display: block; }
    .save-menu button {
      display: block; width: 100%; text-align: left;
      background: transparent; border: none; border-bottom: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 13px;
      padding: 9px 16px; cursor: pointer; transition: background .15s;
    }
    .save-menu button:last-child { border-bottom: none; }
    .save-menu button:hover { background: #2a2f3d; color: #fff; }

    /* Toast */
    #toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--accent2); color: #0a1f1a;
      font-weight: 700; font-size: 13px;
      padding: 9px 20px; border-radius: 8px;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>SQL <span>Viewer</span></h1>
  <p>Leitura, busca e edição de arquivos .sql — tudo local, sem envio de dados</p>
</header>

<div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
  <div class="icon">🗄️</div>
  <label>Clique ou arraste um arquivo .sql aqui</label>
  <p>Suporte a UTF-8, Windows-1252 (ANSI), Latin-1 e outras codificações</p>
  <input type="file" id="file-input" accept=".sql,.txt,.ddl">
</div>

<div class="enc-row" id="enc-row">
  <label>Codificação:</label>
  <select id="enc-select">
    <option value="UTF-8">UTF-8</option>
    <option value="windows-1252">Windows-1252 (ANSI)</option>
    <option value="iso-8859-1">ISO-8859-1 (Latin-1)</option>
    <option value="iso-8859-15">ISO-8859-15</option>
    <option value="UTF-16">UTF-16</option>
  </select>
  <span id="file-badge"></span>
</div>

<div class="toolbar" id="toolbar">
  <button class="btn active" id="btn-view" onclick="setMode('view')">👁 Visualizar</button>
  <button class="btn"        id="btn-edit" onclick="setMode('edit')">✏️ Editar</button>
  <div class="sep"></div>
  <div class="search-wrap">
    <span>🔍</span>
    <input type="text" id="search-input" placeholder="Buscar no código..." oninput="doSearch()">
  </div>
  <span id="match-count"></span>
  <button class="btn" onclick="navMatch(-1)" title="Anterior">▲</button>
  <button class="btn" onclick="navMatch(1)"  title="Próximo">▼</button>
  <div class="sep"></div>
  <button class="btn" onclick="copyCode()">📋 Copiar</button>
  <div class="save-wrap" id="save-wrap">
    <button class="btn" onclick="toggleSaveMenu()">💾 Salvar ▾</button>
    <div class="save-menu" id="save-menu">
      <button onclick="downloadTxt()">📄 Salvar como .txt</button>
      <button onclick="downloadPdf()">🖨️ Salvar como PDF</button>
    </div>
  </div>
  <button class="btn danger" onclick="clearAll()">✕ Fechar</button>
</div>

<div id="code-box">
  <div id="view-pane">
    <div id="line-wrap">
      <div id="line-nums"></div>
      <pre id="code-content"></pre>
    </div>
  </div>
  <div id="edit-pane">
    <textarea id="editor" spellcheck="false" oninput="onEditorInput()"></textarea>
  </div>
</div>

<div class="statusbar" id="statusbar">
  <span>Linhas: <b id="st-lines">0</b></span>
  <span>Caracteres: <b id="st-chars">0</b></span>
  <span>Tamanho: <b id="st-size">—</b></span>
  <span>Modo: <b id="st-mode">Visualização</b></span>
</div>

<div id="toast"></div>

<script>
let rawText = '', fileName = 'script.sql', fileSize = 0, currentFile = null;
let mode = 'view', matchNodes = [], matchIdx = -1;

// ── Drag & Drop ────────────────────────────────────────────────────────────
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});
document.getElementById('enc-select').addEventListener('change', () => {
  if (currentFile) loadFile(currentFile);
});

// ── Load ───────────────────────────────────────────────────────────────────
function loadFile(file) {
  currentFile = file;
  fileName = file.name;
  fileSize = file.size;
  const enc = document.getElementById('enc-select').value;
  const reader = new FileReader();
  reader.onload = e => {
    rawText = fixEncoding(e.target.result);
    renderAll();
    showUI();
  };
  reader.readAsText(file, enc);
}

function fixEncoding(t) {
  return t
    .replace(/^\uFEFF/, '')       // BOM UTF-8
    .replace(/\uFFFD/g, '?')      // caracteres invalidos
    .replace(/\r\n/g, '\n')       // CRLF → LF
    .replace(/\r/g, '\n');        // CR sozinho → LF
}

// ── UI ─────────────────────────────────────────────────────────────────────
function showUI() {
  document.getElementById('enc-row').style.display   = 'flex';
  document.getElementById('toolbar').style.display   = 'flex';
  document.getElementById('code-box').style.display  = 'block';
  document.getElementById('statusbar').style.display = 'flex';
  document.getElementById('drop-zone').style.display = 'none';
  document.getElementById('file-badge').textContent  = '📁 ' + fileName;
}

function setMode(m) {
  mode = m;
  document.getElementById('view-pane').style.display = m === 'view' ? 'block' : 'none';
  document.getElementById('edit-pane').style.display = m === 'edit' ? 'block' : 'none';
  document.getElementById('btn-view').classList.toggle('active', m === 'view');
  document.getElementById('btn-edit').classList.toggle('active', m === 'edit');
  document.getElementById('st-mode').textContent = m === 'view' ? 'Visualização' : 'Edição';
  if (m === 'edit') document.getElementById('editor').focus();
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderAll() {
  renderView();
  document.getElementById('editor').value = rawText;
  updateStatus();
  doSearch();
}

function renderView() {
  const lines = rawText.split('\n');
  document.getElementById('line-nums').innerHTML = lines.map((_,i) => `<span>${i+1}</span>`).join('');
  document.getElementById('code-content').innerHTML = highlight(rawText);
  // Re-apply search marks after re-render
  const q = document.getElementById('search-input').value.trim();
  if (q) applyMarks(q);
}

function updateStatus() {
  document.getElementById('st-lines').textContent = rawText.split('\n').length.toLocaleString('pt-BR');
  document.getElementById('st-chars').textContent = rawText.length.toLocaleString('pt-BR');
  document.getElementById('st-size').textContent  = fmtSize(fileSize);
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(2) + ' MB';
}

function onEditorInput() {
  rawText  = document.getElementById('editor').value;
  fileSize = new Blob([rawText]).size;
  renderView();
  updateStatus();
}

// ── Search ─────────────────────────────────────────────────────────────────
function doSearch() {
  renderView(); // re-render clears old marks
  matchNodes = []; matchIdx = -1;
  const q  = document.getElementById('search-input').value.trim();
  const mc = document.getElementById('match-count');
  if (!q) { mc.textContent = ''; return; }
  applyMarks(q);
  matchNodes = Array.from(document.getElementById('code-content').querySelectorAll('mark'));
  mc.textContent = matchNodes.length ? `${matchNodes.length} resultado(s)` : '0 resultados';
  if (matchNodes.length) { matchIdx = 0; highlightCurrent(); }
}

function applyMarks(q) {
  markTextNodes(document.getElementById('code-content'), q.toLowerCase(), q.length);
}

function markTextNodes(root, lq, qlen) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const hits = [];
  let node;
  while ((node = walker.nextNode())) {
    const lower = node.textContent.toLowerCase();
    let i = lower.indexOf(lq);
    if (i !== -1) hits.push({ node, indices: [] });
    while (i !== -1) { hits[hits.length-1].indices.push(i); i = lower.indexOf(lq, i+1); }
  }
  // Replace in reverse to preserve offsets
  for (const { node, indices } of hits) {
    const txt = node.textContent;
    const frag = document.createDocumentFragment();
    let last = 0;
    for (const idx of indices) {
      if (idx > last) frag.appendChild(document.createTextNode(txt.slice(last, idx)));
      const mark = document.createElement('mark');
      mark.textContent = txt.slice(idx, idx + qlen);
      frag.appendChild(mark);
      last = idx + qlen;
    }
    if (last < txt.length) frag.appendChild(document.createTextNode(txt.slice(last)));
    node.parentNode.replaceChild(frag, node);
  }
}

function navMatch(dir) {
  if (!matchNodes.length) return;
  matchNodes[matchIdx]?.classList.remove('current');
  matchIdx = (matchIdx + dir + matchNodes.length) % matchNodes.length;
  highlightCurrent();
}

function highlightCurrent() {
  const m = matchNodes[matchIdx];
  if (!m) return;
  m.classList.add('current');
  m.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

// ── Actions ────────────────────────────────────────────────────────────────
function copyCode() {
  const txt = mode === 'edit' ? document.getElementById('editor').value : rawText;
  navigator.clipboard.writeText(txt).then(() => toast('Código copiado!'));
}

function toggleSaveMenu() {
  document.getElementById('save-menu').classList.toggle('open');
}

document.addEventListener('click', e => {
  const wrap = document.getElementById('save-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('save-menu').classList.remove('open');
  }
});

function downloadTxt() {
  const txt  = mode === 'edit' ? document.getElementById('editor').value : rawText;
  const name = fileName.replace(/\.[^.]+$/, '') + '.txt';
  const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: name });
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('save-menu').classList.remove('open');
  toast('Salvo como .txt!');
}

function downloadPdf() {
  const txt = mode === 'edit' ? document.getElementById('editor').value : rawText;
  const name = fileName.replace(/\.[^.]+$/, '');

  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>${name}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
    body { margin: 32px 40px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
           line-height: 1.7; color: #1a1a1a; background: #fff; }
    h2 { font-size: 14px; font-family: sans-serif; color: #333; margin-bottom: 16px;
         border-bottom: 1px solid #ddd; padding-bottom: 8px; }
    pre { white-space: pre-wrap; word-break: break-word; }
    @media print { body { margin: 16px 24px; } }
  </style></head><body>
  <h2>📄 ${name}</h2>
  <pre>${txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
  <script>window.onload=function(){window.print();}<\/script>
  </body></html>`);
  win.document.close();

  document.getElementById('save-menu').classList.remove('open');
  toast('Abrindo diálogo de impressão/PDF…');
}

function clearAll() {
  rawText = ''; currentFile = null;
  ['code-content','line-nums'].forEach(id => document.getElementById(id).innerHTML = '');
  document.getElementById('editor').value = '';
  document.getElementById('search-input').value = '';
  document.getElementById('match-count').textContent = '';
  document.getElementById('enc-row').style.display   = 'none';
  document.getElementById('toolbar').style.display   = 'none';
  document.getElementById('code-box').style.display  = 'none';
  document.getElementById('statusbar').style.display = 'none';
  document.getElementById('drop-zone').style.display = 'block';
  document.getElementById('file-input').value = '';
  setMode('view');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Tokenizer / Syntax Highlight ───────────────────────────────────────────
const KEYWORDS = new Set(`SELECT FROM WHERE INSERT INTO VALUES UPDATE SET DELETE CREATE TABLE DROP
ALTER ADD COLUMN INDEX PRIMARY KEY FOREIGN REFERENCES JOIN LEFT RIGHT INNER OUTER CROSS ON AND
OR NOT NULL IS AS DISTINCT ORDER BY GROUP HAVING LIMIT TOP OFFSET FETCH NEXT ROWS ONLY UNION
ALL INTERSECT EXCEPT EXEC EXECUTE BEGIN END TRANSACTION COMMIT ROLLBACK SAVE IF ELSE WHILE
DECLARE PRINT USE GO DATABASE SCHEMA VIEW PROCEDURE PROC FUNCTION TRIGGER RETURNS RETURN
IDENTITY DEFAULT CONSTRAINT UNIQUE CHECK WITH NOLOCK READPAST IN EXISTS CASE WHEN THEN
BETWEEN LIKE ASC DESC OVER PARTITION OUTPUT MERGE MATCHED USING TRUNCATE ENABLE DISABLE
GRANT REVOKE DENY BACKUP RESTORE STATISTICS RECOMPILE OPTION INT BIGINT SMALLINT TINYINT
BIT DECIMAL NUMERIC FLOAT REAL MONEY SMALLMONEY CHAR VARCHAR NCHAR NVARCHAR TEXT NTEXT DATE
TIME DATETIME DATETIME2 SMALLDATETIME DATETIMEOFFSET BINARY VARBINARY IMAGE UNIQUEIDENTIFIER
XML CURSOR ROWVERSION MAXDOP FORCE BULK_LOGGED FULL SIMPLE LOG`.split(/\s+/));

const FUNCTIONS = new Set(`COUNT SUM AVG MIN MAX LEN DATALENGTH UPPER LOWER TRIM LTRIM RTRIM
SUBSTRING LEFT RIGHT CHARINDEX PATINDEX REPLACE STUFF REPLICATE REVERSE SPACE STR UNICODE
CHAR ASCII CONCAT STRING_AGG FORMAT GETDATE GETUTCDATE SYSDATETIME DATEADD DATEDIFF DATENAME
DATEPART EOMONTH ISDATE ISNULL ISNUMERIC COALESCE IIF NULLIF CONVERT CAST TRY_CAST
TRY_CONVERT PARSE TRY_PARSE NEWID NEWSEQUENTIALID ROW_NUMBER RANK DENSE_RANK NTILE LAG
LEAD FIRST_VALUE LAST_VALUE CUME_DIST PERCENT_RANK ABS CEILING FLOOR ROUND POWER SQRT LOG
LOG10 EXP SIGN RAND PI OBJECT_ID OBJECT_NAME SCHEMA_ID SCHEMA_NAME DB_ID DB_NAME USER_NAME
SUSER_NAME HOST_NAME APP_NAME ERROR_MESSAGE ERROR_NUMBER ERROR_SEVERITY ERROR_STATE
SCOPE_IDENTITY IDENT_CURRENT`.split(/\s+/));

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(code) {
  const out = [];
  let i = 0, n = code.length;

  while (i < n) {
    // Block comment /* ... */
    if (code[i]==='/' && code[i+1]==='*') {
      const end = code.indexOf('*/', i+2);
      const chunk = end === -1 ? code.slice(i) : code.slice(i, end+2);
      out.push(`<span class="cm">${esc(chunk)}</span>`);
      i += chunk.length; continue;
    }
    // Line comment --
    if (code[i]==='-' && code[i+1]==='-') {
      const nl = code.indexOf('\n', i);
      const chunk = nl === -1 ? code.slice(i) : code.slice(i, nl);
      out.push(`<span class="cm">${esc(chunk)}</span>`);
      i += chunk.length; continue;
    }
    // String 'value' (handles '' escapes)
    if (code[i]==="'") {
      let j = i+1;
      while (j < n) {
        if (code[j]==="'" && code[j+1]==="'") { j += 2; continue; }
        if (code[j]==="'") { j++; break; }
        j++;
      }
      out.push(`<span class="str">${esc(code.slice(i,j))}</span>`);
      i = j; continue;
    }
    // Bracket identifier [...]
    if (code[i]==='[') {
      const cl = code.indexOf(']', i);
      const chunk = cl === -1 ? code.slice(i) : code.slice(i, cl+1);
      out.push(`<span class="fn">${esc(chunk)}</span>`);
      i += chunk.length; continue;
    }
    // Number
    if (/[0-9]/.test(code[i]) && (i===0 || !/[A-Za-z_]/.test(code[i-1]))) {
      let j = i;
      while (j < n && /[0-9.]/.test(code[j])) j++;
      out.push(`<span class="nm">${esc(code.slice(i,j))}</span>`);
      i = j; continue;
    }
    // Identifier or keyword
    if (/[A-Za-z_#@]/.test(code[i])) {
      let j = i;
      while (j < n && /[A-Za-z0-9_]/.test(code[j])) j++;
      const word = code.slice(i,j);
      const up = word.toUpperCase();
      if (KEYWORDS.has(up))       out.push(`<span class="kw">${esc(word)}</span>`);
      else if (FUNCTIONS.has(up)) out.push(`<span class="fn">${esc(word)}</span>`);
      else out.push(esc(word));
      i = j; continue;
    }
    // Operator
    if (/[=<>!+\-*\/|]/.test(code[i])) {
      out.push(`<span class="op">${esc(code[i])}</span>`);
      i++; continue;
    }
    // Everything else (space, newline, punctuation)
    out.push(esc(code[i]));
    i++;
  }

  return out.join('');
}
</script>
